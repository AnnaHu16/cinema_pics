<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineMood AI - 电影图片生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #080808; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding-bottom: 120px;
        }
        
        /* 顶部比例选择 */
        #ratio-selector {
            position: fixed; top: 10px; display: flex; gap: 15px; 
            background: rgba(255,255,255,0.03); padding: 5px 15px;
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.06);
            z-index: 100;
        }
        .ratio-btn { font-size: 9px; font-weight: bold; color: #555; letter-spacing: 0.1em; transition: 0.3s; }
        .ratio-btn.active { color: #fff; }

        /* 提示文字（常驻顶部） */
        .tip-text { position: fixed; top: 55px; font-size: 10px; color: #666; letter-spacing: 0.3em; text-transform: uppercase; z-index: 90; }

        /* 展示舞台：适配不同比例 */
        #stage {
            width: 90vw; max-width: 450px;
            margin-top: 40px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            transition: all 0.4s ease;
            border-radius: 2px;
            overflow: hidden;
        }

        /* 后端生成的合成好的完整PNG图片 */
        #final-island {
            width: 100%; height: auto; display: none; /* 初始隐藏 */
        }

        /* 加载占位格（默认3:4，高级emo灰） */
        #placeholder {
            width: 100%; aspect-ratio: 3 / 4; 
            background: #111; display: flex; align-items: center; justify-content: center;
        }

        /* 比例类（前端视觉控制） */
        #stage.res-16-9 { aspect-ratio: 16 / 9; max-width: 550px; }
        #stage.res-3-4 { aspect-ratio: 3 / 4; }
        #stage.res-1-1 { aspect-ratio: 1 / 1; max-width: 420px; }

        /* 底部导航栏 */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(18, 18, 18, 0.98); backdrop-filter: blur(20px);
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            display: flex; justify-content: center;
            border-top: 1px solid rgba(255,255,255,0.06); z-index: 80;
        }

        .gen-btn {
            width: 100%; max-width: 320px; padding: 16px;
            background: #fff; color: #000; border-radius: 50px;
            font-size: 12px; font-weight: 900; letter-spacing: 0.25em; text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(255,255,255,0.05);
            transition: all 0.2s ease;
        }
        .gen-btn:active { scale: 0.96; }
        .gen-btn:disabled { background: #333; color: #555; box-shadow: none; }

    </style>
</head>
<body onload="checkWechat()">

    <div id="ratio-selector">
        <button onclick="changeRatio('res-16-9', this, '169')" class="ratio-btn active">16:9电影</button>
        <button onclick="changeRatio('res-3-4', this, '34')" class="ratio-btn">3:4小红书</button>
        <button onclick="changeRatio('res-1-1', this, '11')" class="ratio-btn">1:1朋友圈</button>
    </div>

    <p class="tip-text">↑ 长按拍立得保存至相册 ↑</p>

    <div id="stage" class="res-16-9">
        <div id="placeholder">
            <div class="text-center">
                <div id="spinner" class="animate-spin rounded-full h-7 w-7 border-b-2 border-white mx-auto mb-4" style="display:none;"></div>
                <p id="status-text" class="text-[9px] text-gray-600 tracking-[0.4em] uppercase">READY</p>
            </div>
        </div>
        
        <img id="final-island" src="" alt="长按保存拍立得" contenteditable="false">
    </div>

    <p class="text-[10px] text-gray-800 mt-12 tracking-[0.2em]">© CINEMOOD AI PROFESSIONAL</p>

    <div class="nav-bar">
        <button id="gen-btn" onclick="generate()" class="gen-btn सक्रिय：scale-95 conversion">
            <span id="btn-text">下一张 NEXT</span>
        </button>
    </div>

    <script>
        let currentRatioParam = '169'; // 后端需要这个参数来渲染不同比例的画布

        function checkWechat() {
            const ua = navigator.userAgent.toLowerCase();
            if (ua.match(/MicroMessenger/i) == "micromessenger") {
                // 可以在这里加一个微信特有的气泡提示，目前常驻提示已满足
            }
        }

        function changeRatio(resClass, btn, ratioParam) {
            // 前端只改变视觉比例
            const stage = document.getElementById('stage');
            stage.className = resClass;
            currentRatioParam = ratioParam;

            // 更新按钮状态
            const btns = document.querySelectorAll('.ratio-btn');
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // 切换比例后自动点击一次下一张，以生成新的正确比例图片
            generate();
        }

        async function generate() {
            const btn = document.getElementById('gen-btn');
            const btnText = document.getElementById('btn-text');
            const placeholder = document.getElementById('placeholder');
            const spinner = document.getElementById('spinner');
            const statusText = document.getElementById('status-text');
            const finalImg = document.getElementById('final-island');

            btn.disabled = true;
            btnText.innerText = "DEVELOPING...";
            placeholder.style.display = 'flex';
            finalImg.style.display = 'none';
            spinner.style.display = 'block';
            statusText.innerText = "FILM DEVELOPING";

            try {
                // 调用后端合成接口，并传入用户选择的比例参数
                const res = await fetch(`/api/generate?ratio=${currentRatioParam}`);
                if (!res.ok) throw new Error("后端接口错误");
                
                const data = await res.json();
                
                if (data.image) {
                    // data.image 是后端渲染好的、包含所有内容的Base64拍立得图片
                    finalImg.src = data.image;
                    finalImg.style.display = 'block';
                    placeholder.style.display = 'none';
                    btnText.innerText = "NEXT SHOT";
                } else {
                    throw new Error("图片渲染失败");
                }

            } catch (err) {
                console.error(err);
                statusText.innerText = "ERROR. TRY AGAIN.";
                btnText.innerText = "TRY AGAIN";
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        }
        
        // 首次加载自动生成一张
        window.onload = generate;
    </script>
</body>
</html>
