<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineMood Pro - 电影图片生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0d0d0d; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-h-screen;
            padding-bottom: 100px;
        }
        
        /* 展示区域：限制最大宽度，适配电脑 */
        #stage {
            width: 92vw;
            max-width: 500px;
            margin-top: 20px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            transition: transform 0.3s ease;
        }

        /* 生成好的拍立得图片 */
        #final-island {
            width: 100%;
            height: auto;
            display: none; /* 初始隐藏 */
            border-radius: 4px;
        }

        /* 加载占位格 */
        #placeholder {
            width: 100%;
            aspect-ratio: 3 / 4; /* 拍立得经典比例 */
            background: #1a1a1a;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .loading-text {
            font-size: 10px;
            tracking-[0.3em];
            color: #555;
            text-transform: uppercase;
        }

        /* 底部导航栏 */
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(18, 18, 18, 0.98);
            backdrop-filter: blur(15px);
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 80;
        }

        .gen-btn {
            width: 100%;
            max-width: 300px;
            padding: 15px;
            background: #fff;
            color: #000;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
            tracking-[0.2em];
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }
        .gen-btn:active { scale: 0.96; background: #eee; }
        .gen-btn:disabled { background: #333; color: #555; box-shadow: none; }

        /* 微信提示层 */
        #wechat-tip {
            position: fixed; top: 10px; right: 10px;
            background: rgba(255,255,255,0.9);
            color: #000;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 11px;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body onload="checkWechat()">

    <div id="wechat-tip">↑ 长按图片保存至相册 ↑</div>

    <div class="text-gray-600 text-[10px] tracking-[0.3em] font-bold mb-6 mt-4">
        POLAROID 3:4
    </div>

    <div id="stage">
        <div id="placeholder">
            <div class="text-center">
                <div id="spinner" class="animate-spin rounded-full h-6 w-6 border-b-2 border-gray-700 mx-auto mb-3" style="display:none;"></div>
                <p id="status-text" class="loading-text">READY</p>
            </div>
        </div>
        
        <img id="final-island" src="" alt="长按保存" contenteditable="false">
    </div>

    <p class="text-[10px] text-gray-700 mt-10 tracking-[0.2em]">© CINEMOOD AI</p>

    <div class="nav-bar">
        <button id="gen-btn" onclick="generate()" class="gen-btnactive:scale-95 transition">
            <span id="btn-text">NEXT SHOT</span>
        </button>
    </div>

    <script>
        function checkWechat() {
            const ua = navigator.userAgent.toLowerCase();
            if (ua.match(/MicroMessenger/i) == "micromessenger") {
                document.getElementById('wechat-tip').style.display = 'block';
                // 3秒后自动隐藏提示
                setTimeout(() => {
                    document.getElementById('wechat-tip').style.display = 'none';
                }, 4000);
            }
        }

        async function generate() {
            const btn = document.getElementById('gen-btn');
            const btnText = document.getElementById('btn-text');
            const placeholder = document.getElementById('placeholder');
            const spinner = document.getElementById('spinner');
            const statusText = document.getElementById('status-text');
            const finalImg = document.getElementById('final-island');

            // 状态：加载中
            btn.disabled = true;
            btnText.innerText = "DEVELOPING...";
            placeholder.style.display = 'flex';
            finalImg.style.display = 'none';
            spinner.style.display = 'block';
            statusText.innerText = "FILM DEVELOPING";

            try {
                // 调用后端合成接口
                const res = await fetch('/api/generate');
                if (!res.ok) throw new Error("后端服务异常");
                
                // 后端返回的是合成好的 Base64 图片数据
                const data = await res.json();
                
                if (data.image) {
                    // 状态：完成
                    finalImg.src = data.image;
                    finalImg.style.display = 'block';
                    placeholder.style.display = 'none';
                    btnText.innerText = "NEXT SHOT";
                } else {
                    throw new Error("图片生成失败");
                }

            } catch (err) {
                console.error(err);
                statusText.innerText = "ERROR. TRY AGAIN.";
                btnText.innerText = "TRY AGAIN";
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        }
        
        // 首次加载自动生成一张
        window.onload = function() {
            checkWechat();
            generate();
        };
    </script>
</body>
</html>
