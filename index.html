<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMood Pro- 电影图片生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;900&display=swap" rel="stylesheet">
    <style>
        body { background: #121212; color: #fff; font-family: 'Helvetica Neue', sans-serif; }
        #polaroid-card {
            background: #fdfdfd; 
            padding: 20px 20px 60px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            transition: all 0.5s ease;
        }
        .photo-frame {
            width: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #movie-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .res-16-9 { width: 90vw; max-width: 600px; }
        .res-16-9 .photo-frame { aspect-ratio: 16 / 9; }
        .res-1-1 { width: 85vw; max-width: 450px; }
        .res-1-1 .photo-frame { aspect-ratio: 1 / 1; }
        .res-3-4 { width: 80vw; max-width: 400px; }
        .res-3-4 .photo-frame { aspect-ratio: 3 / 4; }
        .quote-area { margin-top: 30px; padding: 0 10px; color: #1a1a1a; }
        .quote-zh { font-family: 'Noto Serif SC', serif; font-size: 1.25rem; font-weight: 900; line-height: 1.6; margin-bottom: 8px; }
        .quote-en { font-family: 'Georgia', serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; }
        .movie-label { position: absolute; bottom: -45px; right: 0; font-size: 10px; color: #999; font-style: italic; }
        .loading-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 50; }
    </style>
</head>
<body class="flex flex-col items-center py-10">
    <div class="flex gap-4 mb-10">
        <button onclick="setRes('res-16-9')" class="text-[10px] border-b border-gray-600 pb-1">WIDE 16:9</button>
        <button onclick="setRes('res-1-1')" class="text-[10px] border-b border-gray-600 pb-1">SQUARE 1:1</button>
        <button onclick="setRes('res-3-4')" class="text-[10px] border-b border-gray-600 pb-1">PORTRAIT 3:4</button>
    </div>

    <div id="polaroid-card" class="res-16-9">
        <div class="photo-frame">
            <div id="loader" class="loading-overlay"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-white"></div></div>
            <img id="movie-img" src="" alt="">
        </div>
        <div class="quote-area relative">
            <p id="quote-zh" class="quote-zh">每一个瞬间都是电影...</p>
            <p id="quote-en" class="quote-en">Every moment is a scene.</p>
            <p id="movie-meta" class="movie-label"></p>
        </div>
    </div>

    <div class="mt-12 flex gap-8">
        <button onclick="generate()" class="px-8 py-3 bg-white text-black text-xs font-bold rounded-full hover:bg-yellow-400">NEXT SHOT</button>
        <button onclick="download()" class="px-8 py-3 border border-white text-xs font-bold rounded-full">EXPORT</button>
    </div>

    <script>
        function setRes(res) { document.getElementById('polaroid-card').className = res; }

        async function generate() {
            document.getElementById('loader').style.display = 'flex';
            try {
                // 1. 调用后端代理获取电影及台词
                const res = await fetch('/api/generate');
                const data = await res.json();
                
                // 2. 更新界面
                document.getElementById('movie-img').src = data.image;
                document.getElementById('quote-zh').innerText = data.quote.zh;
                document.getElementById('quote-en').innerText = data.quote.en;
                document.getElementById('movie-meta').innerText = `— ${data.title} (${data.year})`;
            } catch (err) {
                alert("生成失败，请稍后再试");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function download() {
            const card = document.getElementById('polaroid-card');
            html2canvas(card, { scale: 3, useCORS: true, backgroundColor: '#121212' }).then(canvas => {
                const link = document.createElement('a');
                link.download = `CineMood-${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
