<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMood - 电影感朋友圈生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f0f0f;
            font-family: 'Noto Serif SC', serif;
            color: #e0e0e0;
        }
        .movie-card {
            aspect-ratio: 2.35 / 1; /* 标准宽银幕比例 */
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #1a1a1a;
        }
        .film-grain {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0.05;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain_Texture.jpg');
        }
        .subtitle {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 0.1em;
        }
        .filter-wong-kar-wai { filter: contrast(1.2) saturate(1.5) hue-rotate(-10deg); }
        .filter-japanese { filter: brightness(1.1) contrast(0.9) sepia(0.1); }
        .filter-classic { filter: grayscale(0.2) contrast(1.1); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-4xl w-full text-center mb-8">
        <h1 class="text-3xl font-bold tracking-widest mb-2">CINEMOOD</h1>
        <p class="text-gray-500 text-sm italic underline decoration-gray-700">“人生如戏，每一帧都是台词”</p>
    </div>

    <div class="flex flex-wrap justify-center gap-4 mb-8">
        <button onclick="changeCategory('lonely')" class="px-4 py-1 border border-gray-600 rounded-full hover:bg-white hover:text-black transition text-xs">孤独患者</button>
        <button onclick="changeCategory('romance')" class="px-4 py-1 border border-gray-600 rounded-full hover:bg-white hover:text-black transition text-xs">烈性爱情</button>
        <button onclick="changeCategory('nihilism')" class="px-4 py-1 border border-gray-600 rounded-full hover:bg-white hover:text-black transition text-xs">虚无主义</button>
        <button onclick="changeCategory('growth')" class="px-4 py-1 border border-gray-600 rounded-full hover:bg-white hover:text-black transition text-xs">成长阵痛</button>
    </div>

    <div id="capture-area" class="movie-card w-full max-w-3xl border border-gray-800">
        <div id="film-filter" class="w-full h-full relative">
            <img id="movie-img" src="" alt="Loading..." class="w-full h-full object-cover">
            <div class="film-grain"></div>
            <div class="absolute bottom-0 w-full text-center pb-6 px-10">
                <p id="movie-quote" class="subtitle text-lg md:text-2xl font-medium text-white mb-2"></p>
                <p id="movie-title" class="text-[10px] text-gray-400 uppercase tracking-tighter opacity-70"></p>
            </div>
        </div>
    </div>

    <div class="mt-10 flex gap-6">
        <button onclick="generateMood()" class="group flex flex-col items-center">
            <div class="w-14 h-14 rounded-full border border-gray-500 flex items-center justify-center group-hover:bg-white group-hover:text-black transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            </div>
            <span class="text-[10px] mt-2 tracking-widest text-gray-400">换一张</span>
        </button>

        <button onclick="saveImage()" class="group flex flex-col items-center">
            <div class="w-14 h-14 rounded-full border border-gray-500 flex items-center justify-center group-hover:bg-white group-hover:text-black transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </div>
            <span class="text-[10px] mt-2 tracking-widest text-gray-400">导出剧照</span>
        </button>
    </div>

    <p class="mt-12 text-[10px] text-gray-700">集齐三张，开启朋友圈装逼模式</p>

    <script>
        // 模拟数据库（实际可扩展连接公开API）
        const movieData = [
            { quote: "我听人讲过，这个世界上有一种鸟是没有脚的。", title: "《阿飞正传》Days of Being Wild", img: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2000", filter: "filter-wong-kar-wai" },
            { quote: "不如，我们重头来过。", title: "《春光乍泄》Happy Together", img: "https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=2000", filter: "filter-wong-kar-wai" },
            { quote: "所有的记忆都是潮湿的。", title: "《2046》", img: "https://images.unsplash.com/photo-1535016120720-40c646bebbbb?q=80&w=2000", filter: "filter-wong-kar-wai" },
            { quote: "人生就是不断地放下。", title: "《少年派的奇幻漂流》Life of Pi", img: "https://images.unsplash.com/photo-1505686994434-e3cc5abf1330?q=80&w=2000", filter: "filter-classic" },
            { quote: "有些事，一万年也不会改变。", title: "《情书》Love Letter", img: "https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=2000", filter: "filter-japanese" }
        ];

        function generateMood() {
            const randomMovie = movieData[Math.floor(Math.random() * movieData.length)];
            const imgElement = document.getElementById('movie-img');
            const quoteElement = document.getElementById('movie-quote');
            const titleElement = document.getElementById('movie-title');
            const filterContainer = document.getElementById('film-filter');

            // 更新内容
            imgElement.src = randomMovie.img;
            quoteElement.innerText = randomMovie.quote;
            titleElement.innerText = randomMovie.title;

            // 随机滤镜
            const filters = ['filter-wong-kar-wai', 'filter-japanese', 'filter-classic'];
            filterContainer.className = 'w-full h-full relative ' + filters[Math.floor(Math.random() * filters.length)];
        }

        function saveImage() {
            alert("在移动端，请长按图片保存。PC端请右键点击另存为。");
            // 这里可以进阶集成 html2canvas 来实现真正的图片合成下载
        }

        // 初始化
        window.onload = generateMood;
    </script>
</body>
</html>
