<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineMood AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0d0d0d; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px 0 calc(40px + env(safe-area-inset-bottom));
        }

        /* 顶部比例切换 */
        .ratio-selector {
            display: flex; gap: 20px; margin-bottom: 20px;
            background: rgba(255,255,255,0.05); padding: 8px 20px;
            border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
        }
        .ratio-btn { font-size: 10px; font-weight: bold; color: #666; letter-spacing: 0.1em; transition: 0.3s; }
        .ratio-btn.active { color: #fff; }

        /* 提示文字 */
        .tip-text { font-size: 11px; color: #888; letter-spacing: 0.2em; margin-bottom: 20px; text-transform: uppercase; }

        /* 拍立得容器 */
        #polaroid-card {
            background: #fdfdfd; padding: 12px 12px 40px 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            width: 90vw; max-width: 420px;
            display: flex; flex-direction: column; border-radius: 2px;
        }

        .photo-frame {
            width: 100%; background: #000; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        /* 三种比例控制 */
        .res-16-9 .photo-frame { aspect-ratio: 16 / 9; }
        .res-3-4 .photo-frame { aspect-ratio: 3 / 4; }
        .res-1-1 .photo-frame { aspect-ratio: 1 / 1; }

        #movie-img { width: 100%; height: 100%; object-fit: cover; }

        .quote-area { margin-top: 25px; padding: 0 4px; color: #1a1a1a; }
        .quote-zh { 
            font-family: 'Noto Serif SC', serif; 
            font-size: 1.15rem; font-weight: 900; line-height: 1.4; margin-bottom: 8px; 
        }
        .quote-en { 
            font-family: 'Georgia', serif; font-size: 0.7rem; 
            text-transform: uppercase; letter-spacing: 0.05em; color: #777; line-height: 1.3;
        }
        .movie-label { font-size: 9px; color: #aaa; font-style: italic; margin-top: 15px; text-align: right; }

        /* 底部按钮 */
        .next-btn {
            position: fixed; bottom: calc(30px + env(safe-area-inset-bottom));
            width: 80vw; max-width: 300px; padding: 16px;
            background: #fff; color: #000; border-radius: 50px;
            font-size: 12px; font-weight: 900; letter-spacing: 0.2em;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: 0.3s; z-index: 100;
        }
        .next-btn:active { transform: scale(0.95); opacity: 0.9; }
        .next-btn:disabled { background: #333; color: #666; }

        /* 全屏加载 */
        #loader {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200;
        }
    </style>
</head>
<body>

    <div class="ratio-selector" id="ratios">
        <button onclick="changeRatio('res-16-9', this)" class="ratio-btn active">16:9电影</button>
        <button onclick="changeRatio('res-3-4', this)" class="ratio-btn">3:4小红书</button>
        <button onclick="changeRatio('res-1-1', this)" class="ratio-btn">1:1朋友圈</button>
    </div>

    <p class="tip-text">↑ 长按图片保存至相册 ↑</p>

    <div id="polaroid-card" class="res-16-9">
        <div class="photo-frame">
            <img id="movie-img" src="" alt="">
        </div>
        <div class="quote-area">
            <p id="quote-zh" class="quote-zh">加载中...</p>
            <p id="quote-en" class="quote-en">Loading cinematic moment...</p>
            <p id="movie-meta" class="movie-label"></p>
        </div>
    </div>

    <button id="gen-btn" onclick="generate()" class="next-btn">下一张 NEXT</button>

    <div id="loader">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-white mb-4"></div>
        <p class="text-[10px] tracking-widest text-gray-500 uppercase">Film Developing...</p>
    </div>

    <script>
        let currentRatio = 'res-16-9';

        function changeRatio(ratio, btn) {
            currentRatio = ratio;
            document.getElementById('polaroid-card').className = ratio;
            // 更新按钮状态
            const btns = document.querySelectorAll('.ratio-btn');
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function generate() {
            const btn = document.getElementById('gen-btn');
            const loader = document.getElementById('loader');
            const movieImg = document.getElementById('movie-img');

            btn.disabled = true;
            loader.style.display = 'flex';

            try {
                const res = await fetch('/api/generate');
                if (!res.ok) throw new Error("API Error");
                const data = await res.json();
                
                // 加载数据
                movieImg.src = data.image; 
                document.getElementById('quote-zh').innerText = data.quote.zh;
                document.getElementById('quote-en').innerText = data.quote.en;
                document.getElementById('movie-meta').innerText = `— ${data.title} (${data.year})`;
                
                // 等待图片加载完成后移除 Loading
                movieImg.onload = () => {
                    loader.style.display = 'none';
                    btn.disabled = false;
                };

            } catch (err) {
                console.error(err);
                alert("生成失败，请刷新重试");
                loader.style.display = 'none';
                btn.disabled = false;
            }
        }
        
        // 自动加载第一张
        window.onload = generate;
    </script>
</body>
</html>
