<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineMood AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background: #080808; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* 1. 隐藏原始 DOM，只用来作为截图源 */
        #render-source { position: fixed; left: -9999px; top: 0; }

        /* 2. 拍立得样式设计 */
        .polaroid { 
            background: #fdfdfd; padding: 15px 15px 45px 15px; width: 600px; /* 固定宽度渲染更清晰 */
            display: flex; flex-direction: column; align-items: center;
        }
        .photo-frame { width: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .res-16-9 .photo-frame { aspect-ratio: 16 / 9; }
        .res-3-4 .photo-frame { aspect-ratio: 3 / 4; }
        .res-1-1 .photo-frame { aspect-ratio: 1 / 1; }

        /* 3. 电影级字幕排版 */
        .quote-area { margin-top: 35px; text-align: center; width: 100%; }
        .quote-zh { 
            color: #f1c40f; font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); margin-bottom: 10px; padding: 0 20px;
        }
        .quote-en { color: #888; font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; padding: 0 30px; }
        .movie-meta { color: #aaa; font-size: 11px; margin-top: 30px; width: 100%; text-align: right; padding-right: 10px; font-style: italic; }

        /* 4. 前端展示层 */
        #display-area { width: 90vw; max-width: 450px; margin-top: 60px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        #final-img { width: 100%; height: auto; display: none; border-radius: 4px; }
        #placeholder { width: 100%; aspect-ratio: 3/4; background: #111; display: flex; align-items: center; justify-content: center; border-radius: 4px; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 20px; display: flex; justify-content: center; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        .gen-btn { width: 80%; max-width: 300px; padding: 15px; background: #fff; color: #000; border-radius: 50px; font-weight: 900; letter-spacing: 0.2em; }
        .gen-btn:disabled { background: #333; color: #555; }
        
        .ratio-tabs { position: fixed; top: 20px; display: flex; gap: 15px; z-index: 100; }
        .tab { font-size: 10px; color: #555; font-weight: bold; }
        .tab.active { color: #fff; border-bottom: 2px solid #fff; }
    </style>
</head>
<body>

    <div class="ratio-tabs">
        <button onclick="setRatio('res-16-9', this)" class="tab active">16:9</button>
        <button onclick="setRatio('res-3-4', this)" class="tab">3:4</button>
        <button onclick="setRatio('res-1-1', this)" class="tab">1:1</button>
    </div>

    <div id="display-area">
        <div id="placeholder"><p class="text-xs text-gray-700 tracking-widest">READY</p></div>
        <img id="final-img" src="">
    </div>

    <p class="text-[10px] text-gray-600 mt-6 tracking-[0.3em]">↑ 长按保存完整拍立得 ↑</p>

    <div id="render-source">
        <div id="capture-target" class="polaroid res-16-9">
            <div class="photo-frame"><img id="source-img" src=""></div>
            <div class="quote-area">
                <p id="target-zh" class="quote-zh"></p>
                <p id="target-en" class="quote-en"></p>
                <p id="target-meta" class="movie-meta"></p>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <button id="gen-btn" onclick="generate()" class="gen-btn">下一张 NEXT</button>
    </div>

    <script>
        let currentRatio = 'res-16-9';

        function setRatio(r, btn) {
            currentRatio = r;
            document.getElementById('capture-target').className = `polaroid ${r}`;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            generate();
        }

        async function generate() {
            const btn = document.getElementById('gen-btn');
            const finalImg = document.getElementById('final-img');
            const placeholder = document.getElementById('placeholder');
            
            btn.disabled = true;
            btn.innerText = "生成中...";
            placeholder.style.display = 'flex';
            finalImg.style.display = 'none';

            try {
                const res = await fetch('/api/generate');
                const data = await res.json();

                // 1. 填充隐藏的 DOM
                const sourceImg = document.getElementById('source-img');
                sourceImg.src = data.image;
                document.getElementById('target-zh').innerText = data.quote.zh;
                document.getElementById('target-en').innerText = data.quote.en;
                document.getElementById('target-meta').innerText = `— ${data.title} (${data.year})`;

                // 2. 等待图片加载后截图
                sourceImg.onload = async () => {
                    const canvas = await html2canvas(document.getElementById('capture-target'), {
                        scale: 2,
                        useCORS: true,
                        backgroundColor: '#fdfdfd'
                    });
                    
                    // 3. 将截图转为 Base64 显示在主屏幕
                    finalImg.src = canvas.toDataURL("image/png");
                    finalImg.style.display = 'block';
                    placeholder.style.display = 'none';
                    btn.disabled = false;
                    btn.innerText = "下一张 NEXT";
                };
            } catch (e) {
                btn.innerText = "TRY AGAIN";
                btn.disabled = false;
            }
        }

        window.onload = generate;
    </script>
</body>
</html>
