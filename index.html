<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineMood AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #f8f4ee;
            --ink: #1a1a1a;
            --dim: #888;
            --accent: #c8a97e;
            --bg: #0c0b09;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: #fff;
            font-family: -apple-system, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ════════════════════════════════════════
           心情选择屏
        ════════════════════════════════════════ */
        #mood-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            padding: 40px 28px calc(40px + env(safe-area-inset-bottom));
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        #mood-screen.leaving {
            opacity: 0;
            transform: translateY(-24px);
            pointer-events: none;
        }
        #mood-screen.gone { display: none; }

        .mood-eyebrow {
            font-size: 10px;
            letter-spacing: 0.5em;
            color: #3a3830;
            text-transform: uppercase;
            margin-bottom: 28px;
        }
        .mood-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 6px;
            text-align: center;
        }
        .mood-sub {
            font-size: 12px;
            color: #3a3830;
            margin-bottom: 44px;
            text-align: center;
            letter-spacing: 0.05em;
        }

        /* 四格心情 */
        .mood-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 310px;
            margin-bottom: 14px;
        }
        .mood-btn {
            border: 1px solid #1c1b18;
            background: #111;
            border-radius: 14px;
            padding: 22px 12px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 9px;
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s, transform 0.1s;
            -webkit-user-select: none;
        }
        .mood-btn:active { transform: scale(0.95); }
        .mood-icon { font-size: 30px; line-height: 1; }
        .mood-label { font-size: 13px; color: #666; letter-spacing: 0.04em; }

        /* 分割线 */
        .or-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 310px;
            margin: 6px 0 14px;
            color: #252420;
            font-size: 11px;
            letter-spacing: 0.2em;
        }
        .or-divider::before, .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #1c1b18;
        }

        /* 今日上映卡 */
        .today-btn {
            width: 100%;
            max-width: 310px;
            border: 1px solid #1c1b18;
            background: #0e0d0b;
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s, transform 0.1s;
            margin-bottom: 44px;
        }
        .today-btn:active { transform: scale(0.98); }
        .today-icon { font-size: 28px; flex-shrink: 0; }
        .today-text { text-align: left; }
        .today-title { font-size: 14px; color: #888; line-height: 1.4; }
        .today-desc  { font-size: 11px; color: #333; margin-top: 3px; line-height: 1.4; }

        /* 随机入口 */
        .random-link {
            font-size: 11px;
            color: #2e2d28;
            letter-spacing: 0.1em;
            cursor: pointer;
            text-decoration: none;
            border-bottom: 1px solid #252420;
            padding-bottom: 1px;
            transition: color 0.2s, border-color 0.2s;
        }
        .random-link:active { color: #555; border-color: #555; }


        /* ════════════════════════════════════════
           主界面
        ════════════════════════════════════════ */
        #main-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            padding-bottom: 110px;
            min-height: 100vh;
        }
        #main-screen.visible { display: flex; }

        /* 顶部栏 */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 52px;
            background: rgba(12,11,9,0.94);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid #181714;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }
        .top-logo {
            font-size: 11px;
            letter-spacing: 0.35em;
            color: #3a3830;
            text-transform: uppercase;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            padding: 7px 13px 7px 10px;
            border: 1px solid #2a2820;
            border-radius: 40px;
            background: #111008;
            transition: color 0.18s, border-color 0.18s, background 0.18s;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }
        .back-btn:active {
            color: var(--accent);
            border-color: #3a2e18;
            background: #1a1408;
        }
        .back-arrow {
            width: 14px; height: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .back-arrow svg { width: 12px; height: 12px; }

        /* 图片展示区 */
        #display-area {
            width: 92vw;
            max-width: 440px;
            box-shadow: 0 28px 70px rgba(0,0,0,0.9);
            border-radius: 2px;
            overflow: hidden;
            background: var(--cream);
            position: relative;
        }

        /* 胶片显影遮罩 */
        #develop-overlay {
            position: absolute;
            inset: 0;
            background: #0c0b09;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
        }
        #develop-overlay.developing {
            animation: develop 2s cubic-bezier(0.25, 0, 0.15, 1) forwards;
        }
        @keyframes develop {
            0%   { opacity: 1;    filter: brightness(0); }
            20%  { opacity: 0.92; filter: brightness(0.15) sepia(1) saturate(0.5) hue-rotate(15deg); }
            50%  { opacity: 0.55; filter: brightness(0.55) sepia(0.4) saturate(0.8); }
            80%  { opacity: 0.18; filter: brightness(0.9) sepia(0.08); }
            100% { opacity: 0;    filter: none; }
        }

        #final-img { width: 100%; height: auto; display: none; }

        #placeholder {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #0e0d0b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }
        .film-strip { display: flex; gap: 5px; }
        .film-hole {
            width: 7px; height: 7px;
            border-radius: 1px;
            background: #1e1d1a;
            animation: fhole 1.4s ease-in-out infinite;
        }
        .film-hole:nth-child(2) { animation-delay: 0.25s; }
        .film-hole:nth-child(3) { animation-delay: 0.5s; }
        .film-hole:nth-child(4) { animation-delay: 0.75s; }
        @keyframes fhole {
            0%,100% { opacity: 0.25; background: #1e1d1a; }
            50% { opacity: 1; background: var(--accent); }
        }
        .loading-text { color: #2e2d28; font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; }

        /* 运势条 */
        #fortune-bar {
            width: 92vw;
            max-width: 440px;
            margin-top: 12px;
            padding: 16px 18px;
            background: #0e0d0b;
            border: 1px solid #181714;
            border-radius: 10px;
            display: none;
            gap: 12px;
            align-items: flex-start;
            animation: fadeUp 0.5s ease forwards;
        }
        #fortune-bar.visible { display: flex; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: none; }
        }
        .fortune-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            margin-top: 6px;
        }
        .fortune-content { flex: 1; }
        .fortune-eyebrow { font-size: 9px; color: #333; letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 6px; }
        .today-badge {
            display: inline-block;
            background: #16130e;
            color: var(--accent);
            font-size: 10px;
            padding: 2px 9px;
            border-radius: 20px;
            border: 1px solid #2a2218;
            margin-bottom: 7px;
            letter-spacing: 0.04em;
        }
        .fortune-text {
            font-size: 13px;
            color: #999;
            line-height: 1.7;
            font-family: 'Noto Serif SC', serif;
        }

        /* 长按提示条 */
        .save-hint {
            width: 92vw;
            max-width: 440px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 18px;
            background: #111008;
            border: 1px solid #2a2820;
            border-radius: 40px;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.4s ease, transform 0.4s ease;
            pointer-events: none;
        }
        .save-hint.show {
            opacity: 1;
            transform: translateY(0);
        }
        .save-hint.hide {
            opacity: 0;
            transform: translateY(4px);
        }
        .save-hint-icon {
            font-size: 14px;
            line-height: 1;
            flex-shrink: 0;
        }
        .save-hint-text {
            font-size: 11px;
            color: #555;
            letter-spacing: 0.12em;
        }
        .save-hint-text strong {
            color: var(--accent);
            font-weight: 600;
        }

        /* 隐藏渲染源 */
        #render-source {
            position: fixed;
            left: -9999px;
            top: 0;
            pointer-events: none;
        }

        /* 拍立得本体（html2canvas 捕获用） */
        .polaroid {
            background: var(--cream);
            padding: 14px 14px 50px;
            width: 640px;
            display: flex;
            flex-direction: column;
            font-family: 'Noto Serif SC', serif;
        }
        .photo-frame {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            position: relative;
        }
        .photo-frame .img-blur {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; object-position: center;
            filter: blur(20px) brightness(0.4) saturate(1.3);
            transform: scale(1.1);
        }
        .photo-frame .img-main {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: contain; object-position: center;
        }
        .quote-area { margin-top: 26px; width: 100%; padding: 0 18px; }
        .quote-zh-wrap { border-left: 3px solid var(--accent); padding-left: 14px; margin-bottom: 12px; }
        .quote-zh { color: var(--ink); font-family: 'Noto Serif SC', serif; font-size: 26px; font-weight: 900; line-height: 1.6; word-break: break-all; }
        .quote-en { color: #999; font-family: 'DM Serif Display', Georgia, serif; font-size: 12px; font-style: italic; letter-spacing: 0.04em; line-height: 1.5; }
        .movie-meta { margin-top: 18px; width: 100%; display: flex; justify-content: flex-end; align-items: center; gap: 6px; padding-right: 6px; }
        .meta-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .meta-text { color: var(--dim); font-size: 11px; font-style: italic; font-family: Georgia, serif; }

        /* 底部按钮栏 */
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(12,11,9,0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 14px 20px;
            padding-bottom: calc(14px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
            border-top: 1px solid #181714;
            z-index: 100;
        }
        .gen-btn {
            width: 85%;
            max-width: 320px;
            padding: 15px;
            background: #fff;
            color: #0c0b09;
            border-radius: 4px;
            font-weight: 900;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            font-size: 11px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .gen-btn:active { transform: scale(0.97); }
        .gen-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* 错误提示 */
        .error-toast {
            position: fixed;
            top: 64px; left: 50%;
            transform: translateX(-50%);
            background: #8b2020; color: #fff;
            font-size: 12px; padding: 8px 20px;
            border-radius: 40px; z-index: 200;
            opacity: 0; transition: opacity 0.3s;
            white-space: nowrap;
        }
        .error-toast.show { opacity: 1; }
    </style>
</head>
<body>

    <!-- ① 心情选择屏 -->
    <div id="mood-screen">
        <p class="mood-eyebrow">CineMood AI</p>
        <h1 class="mood-title">今天的心情是？</h1>
        <p class="mood-sub">选一个，马上为你冲洗这一帧</p>

        <div class="mood-grid">
            <button class="mood-btn" onclick="startWithMood('happy')">
                <span class="mood-icon">☀️</span>
                <span class="mood-label">开心</span>
            </button>
            <button class="mood-btn" onclick="startWithMood('sad')">
                <span class="mood-icon">🌧️</span>
                <span class="mood-label">有点难过</span>
            </button>
            <button class="mood-btn" onclick="startWithMood('courage')">
                <span class="mood-icon">🔥</span>
                <span class="mood-label">需要勇气</span>
            </button>
            <button class="mood-btn" onclick="startWithMood('lonely')">
                <span class="mood-icon">🌙</span>
                <span class="mood-label">有点孤独</span>
            </button>
        </div>

        <div class="or-divider">或者</div>

        <button class="today-btn" onclick="startWithMood('random', 'today')">
            <span class="today-icon">🎬</span>
            <div class="today-text">
                <p class="today-title">历史上的今天上映的电影</p>
                <p class="today-desc">附赠影评，希望你喜欢</p>
            </div>
        </button>

        <span class="random-link" onclick="startWithMood('random')">随便给我一张 →</span>
    </div>


    <!-- ② 主界面 -->
    <div id="main-screen">

        <div class="top-bar">
            <span class="top-logo">CineMood</span>
            <button class="back-btn" onclick="goBack()">
                <span class="back-arrow">
                    <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
                重新选择
            </button>
        </div>

        <div id="display-area">
            <div id="develop-overlay"></div>
            <div id="placeholder">
                <div class="film-strip">
                    <div class="film-hole"></div>
                    <div class="film-hole"></div>
                    <div class="film-hole"></div>
                    <div class="film-hole"></div>
                </div>
                <p class="loading-text">Developing</p>
            </div>
            <img id="final-img" src="" alt="电影拍立得">
        </div>

        <div id="fortune-bar">
            <div class="fortune-dot"></div>
            <div class="fortune-content">
                <p class="fortune-eyebrow">影评</p>
                <div id="today-badge" class="today-badge" style="display:none"></div>
                <p id="fortune-text" class="fortune-text"></p>
            </div>
        </div>

        <div class="save-hint" id="save-hint">
            <span class="save-hint-icon">👆</span>
            <span class="save-hint-text"><strong>长按图片</strong>即可保存到相册</span>
        </div>

        <div class="nav-bar">
            <button id="gen-btn" class="gen-btn" onclick="generate()">下一张 NEXT</button>
        </div>
    </div>

    <!-- 隐藏渲染源 -->
    <div id="render-source">
        <div id="capture-target" class="polaroid">
            <div class="photo-frame">
                <img class="img-blur" id="source-img-blur" src="" alt="">
                <img class="img-main" id="source-img"      src="" alt="">
            </div>
            <div class="quote-area">
                <div class="quote-zh-wrap">
                    <p id="target-zh" class="quote-zh"></p>
                </div>
                <p id="target-en" class="quote-en"></p>
                <div class="movie-meta">
                    <div class="meta-dot"></div>
                    <p id="target-meta" class="meta-text"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="error-toast" class="error-toast"></div>

    <script>
        let currentMood  = 'random';
        let currentMode  = 'random';
        let currentData  = null;
        let isRendering  = false;
        let audioCtx     = null;

        // ── 页面切换 ────────────────────────────────────────────────────────
        function showMain() {
            const moodScreen = document.getElementById('mood-screen');
            const mainScreen = document.getElementById('main-screen');
            moodScreen.classList.add('leaving');
            setTimeout(() => {
                moodScreen.classList.add('gone');
                mainScreen.classList.add('visible');
            }, 380);
        }

        function goBack() {
            const moodScreen = document.getElementById('mood-screen');
            const mainScreen = document.getElementById('main-screen');
            mainScreen.classList.remove('visible');
            moodScreen.classList.remove('gone', 'leaving');
            // 重置运势条
            document.getElementById('fortune-bar').classList.remove('visible');
        }

        // ── 心情入口（即刻跳转）────────────────────────────────────────────
        function startWithMood(mood, mode) {
            currentMood = mood || 'random';
            currentMode = mode || 'random';
            showMain();
            generate();
        }

        // ── 音效：相机咔嚓声 ────────────────────────────────────────────────
        // 两层：短促宽频噪声（快门撞击感）+ 低频衰减体（机械回弹）
        function playFilmSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const ctx = audioCtx;
                const t   = ctx.currentTime;

                // 层 1：咔嚓主体 — 极短宽频噪声，快速衰减
                const clickLen = Math.floor(ctx.sampleRate * 0.055);
                const clickBuf = ctx.createBuffer(1, clickLen, ctx.sampleRate);
                const cd       = clickBuf.getChannelData(0);
                for (let i = 0; i < clickLen; i++) {
                    // 靠前段振幅大，迅速衰减 → 撞击感
                    cd[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / clickLen, 3.5);
                }
                const clickSrc  = ctx.createBufferSource();
                clickSrc.buffer = clickBuf;
                const clickGain = ctx.createGain();
                clickGain.gain.setValueAtTime(0.75, t);
                clickGain.gain.exponentialRampToValueAtTime(0.001, t + 0.055);
                clickSrc.connect(clickGain).connect(ctx.destination);
                clickSrc.start(t);

                // 层 2：低频机械回弹 — 短促正弦，无高频成分
                const thud  = ctx.createOscillator();
                const thudG = ctx.createGain();
                thud.type = 'sine';
                thud.frequency.setValueAtTime(120, t + 0.002);
                thud.frequency.exponentialRampToValueAtTime(55, t + 0.07);
                thudG.gain.setValueAtTime(0.18, t + 0.002);
                thudG.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                thud.connect(thudG).connect(ctx.destination);
                thud.start(t + 0.002);
                thud.stop(t + 0.11);

            } catch (e) { /* 静默失败 */ }
        }

        // ── 长按保存提示（仅首次出现）────────────────────────────────────────
        let hintShown = false;
        function showSaveHint() {
            const hint = document.getElementById('save-hint');
            if (!hint) return;
            // 每次图片出现都短暂显示，4秒后淡出
            hint.classList.remove('hide');
            hint.classList.add('show');
            clearTimeout(hint._timer);
            hint._timer = setTimeout(() => {
                hint.classList.add('hide');
                hint.addEventListener('transitionend', () => {
                    hint.classList.remove('show', 'hide');
                }, { once: true });
            }, 4000);
        }

        // ── 错误提示 ────────────────────────────────────────────────────────
        function showError(msg) {
            const toast = document.getElementById('error-toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ── 胶片显影动画 ────────────────────────────────────────────────────
        function triggerDevelop() {
            const overlay = document.getElementById('develop-overlay');
            overlay.classList.remove('developing');
            void overlay.offsetWidth;
            overlay.classList.add('developing');
            overlay.addEventListener('animationend', () => overlay.classList.remove('developing'), { once: true });
        }

        // ── Canvas 渲染 ─────────────────────────────────────────────────────
        function renderCanvas({ silent = false } = {}) {
            if (isRendering) return;
            isRendering = true;

            const btn         = document.getElementById('gen-btn');
            const finalImg    = document.getElementById('final-img');
            const placeholder = document.getElementById('placeholder');

            if (silent) {
                finalImg.style.opacity    = '0.3';
                finalImg.style.transition = 'opacity 0.15s';
            } else {
                btn.disabled              = true;
                placeholder.style.display = 'flex';
                finalImg.style.display    = 'none';
                finalImg.style.opacity    = '1';
            }

            html2canvas(document.getElementById('capture-target'), {
                scale: 3, backgroundColor: '#f8f4ee',
                useCORS: true, allowTaint: false, logging: false,
            }).then(canvas => {
                finalImg.src              = canvas.toDataURL('image/jpeg', 0.95);
                finalImg.style.display    = 'block';
                finalImg.style.opacity    = '1';
                placeholder.style.display = 'none';
                if (!silent) {
                    triggerDevelop();
                    playFilmSound();
                    btn.disabled  = false;
                    btn.innerText = '下一张 NEXT';
                    showSaveHint();
                }
            }).catch(() => {
                showError('渲染失败，请重试');
                finalImg.style.opacity = '1';
                if (!silent) {
                    btn.disabled              = false;
                    btn.innerText             = '下一张 NEXT';
                    placeholder.style.display = 'none';
                }
            }).finally(() => { isRendering = false; });
        }

        // ── 主生成函数 ──────────────────────────────────────────────────────
        async function generate() {
            const btn         = document.getElementById('gen-btn');
            const finalImg    = document.getElementById('final-img');
            const placeholder = document.getElementById('placeholder');
            const fortuneBar  = document.getElementById('fortune-bar');

            btn.disabled              = true;
            btn.innerText             = 'DEVELOPING...';
            placeholder.style.display = 'flex';
            finalImg.style.display    = 'none';
            finalImg.style.opacity    = '1';
            fortuneBar.classList.remove('visible');

            try {
                const res  = await fetch(`/api/generate?mood=${currentMood}&mode=${currentMode}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                if (!data.image?.b64) throw new Error('No image');

                currentData = data;

                document.getElementById('target-zh').innerText   = data.quote.zh;
                document.getElementById('target-en').innerText   = data.quote.en;
                document.getElementById('target-meta').innerText =
                    `${data.title}${data.year ? '  ' + data.year : ''}`;

                // 运势条（仅 today 模式）
                if (data.isTodayMovie && data.quote?.review) {
                    document.getElementById('fortune-text').innerText = data.quote.review;
                    const badge = document.getElementById('today-badge');
                    if (data.todayLabel) {
                        badge.textContent   = `${data.todayLabel} 上映纪念`;
                        badge.style.display = 'inline-block';
                    }
                    fortuneBar.classList.add('visible');
                }

                const focal   = data.image.focal;
                const mainImg = document.getElementById('source-img');
                mainImg.style.objectPosition = `${focal.x}% ${focal.y}%`;
                document.getElementById('source-img-blur').src = data.image.b64;

                mainImg.onload  = () => renderCanvas({ silent: false });
                mainImg.onerror = () => {
                    showError('图片加载失败');
                    btn.disabled  = false;
                    btn.innerText = '下一张 NEXT';
                };
                mainImg.src = data.image.b64;

            } catch (err) {
                console.error(err);
                showError('获取失败，请重试');
                btn.disabled              = false;
                btn.innerText             = '重试 RETRY';
                placeholder.style.display = 'none';
            }
        }
    </script>
</body>
