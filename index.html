<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineMood AI - 电影图片生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background: #080808; color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #render-source { position: fixed; left: -9999px; top: 0; visibility: hidden; }
        
        /* 渲染源：固定宽度 */
        .polaroid { background: #fdfdfd; padding: 15px 15px 45px 15px; width: 600px; display: flex; flex-direction: column; align-items: center; }
        .photo-frame { width: 100%; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* 动态比例类 */
        .res-16-9 .photo-frame { aspect-ratio: 16 / 9; }
        .res-3-4 .photo-frame { aspect-ratio: 3 / 4; }
        .res-1-1 .photo-frame { aspect-ratio: 1 / 1; }

        .quote-area { margin-top: 35px; text-align: left; width: 100%; padding: 0 35px; }
        .quote-zh { color: #000; font-family: 'Noto Serif SC', serif; font-size: 28px; font-weight: 900; line-height: 1.5; margin-bottom: 12px; }
        .quote-en { color: #777; font-family: 'Georgia', serif; font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; line-height: 1.4; }
        .movie-meta { color: #aaa; font-size: 11px; margin-top: 35px; width: 100%; text-align: right; padding-right: 15px; font-style: italic; }

        /* 展示区 */
        #display-area { width: 92vw; max-width: 450px; margin-top: 60px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); border-radius: 4px; overflow: hidden; position: relative; }
        #final-img { width: 100%; height: auto; display: none; }
        #placeholder { width: 100%; aspect-ratio: 3/4; background: #111; display: flex; align-items: center; justify-content: center; }

        /* 交互组件 */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); padding: 20px; display: flex; justify-content: center; padding-bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 100; }
        .gen-btn { width: 85%; max-width: 300px; padding: 16px; background: #fff; color: #000; border-radius: 50px; font-weight: 900; letter-spacing: 0.25em; }
        .ratio-tabs { position: fixed; top: 15px; display: flex; gap: 15px; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 40px; z-index: 100; }
        .tab { font-size: 10px; color: #666; font-weight: bold; padding: 5px 10px; transition: 0.2s; }
        .tab.active { color: #fff; background: rgba(255,255,255,0.1); border-radius: 20px; }
    </style>
</head>
<body>

    <div class="ratio-tabs" id="tabs">
        <button onclick="switchRatio('res-16-9', this)" class="tab active">16:9</button>
        <button onclick="switchRatio('res-3-4', this)" class="tab">3:4</button>
        <button onclick="switchRatio('res-1-1', this)" class="tab">1:1</button>
    </div>

    <div id="display-area">
        <div id="placeholder">
            <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-gray-600"></div>
        </div>
        <img id="final-img" src="">
    </div>

    <p class="text-gray-700 text-[10px] tracking-[0.4em] mt-8">↑ 长按卡片保存当前比例 ↑</p>

    <div id="render-source">
        <div id="capture-target" class="polaroid res-16-9">
            <div class="photo-frame"><img id="source-img" src="" crossorigin="anonymous"></div>
            <div class="quote-area">
                <p id="target-zh" class="quote-zh"></p>
                <p id="target-en" class="quote-en"></p>
                <p id="target-meta" class="movie-meta"></p>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <button id="gen-btn" onclick="fetchNewMovie()" class="gen-btn active:scale-95 transition">
            <span id="btn-text">下一张 NEXT</span>
        </button>
    </div>

    <script>
        let currentData = null; // 存储当前电影数据，防止切换比例时重复请求

        // 仅切换比例，不请求后端
        function switchRatio(ratioClass, btn) {
            if (!currentData) return; 
            
            // 更新 UI 状态
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            
            // 改变渲染源比例并重新截图
            document.getElementById('capture-target').className = `polaroid ${ratioClass}`;
            renderCanvas();
        }

        // 获取新内容
        async function fetchNewMovie() {
            const btn = document.getElementById('gen-btn');
            const btnText = document.getElementById('btn-text');
            const finalImg = document.getElementById('final-img');
            const placeholder = document.getElementById('placeholder');
            
            btn.disabled = true;
            btnText.innerText = "DEVELOPING...";
            placeholder.style.display = 'flex';
            finalImg.style.display = 'none';

            try {
                // 加上时间戳，彻底干掉缓存
                const res = await fetch(`/api/generate?t=${Date.now()}`);
                currentData = await res.json();

                document.getElementById('target-zh').innerText = currentData.quote.zh;
                document.getElementById('target-en').innerText = currentData.quote.en;
                document.getElementById('target-meta').innerText = `— ${currentData.title} ${currentData.year ? '('+currentData.year+')' : ''}`;
                
                const sourceImg = document.getElementById('source-img');
                sourceImg.src = currentData.image;

                sourceImg.onload = () => renderCanvas();

            } catch (err) {
                console.error(err);
                btnText.innerText = "TRY AGAIN";
                btn.disabled = false;
            }
        }

        // 核心渲染函数：把当前 DOM 转为图片
        function renderCanvas() {
            const target = document.getElementById('capture-target');
            const finalImg = document.getElementById('final-img');
            const placeholder = document.getElementById('placeholder');
            const btn = document.getElementById('gen-btn');
            const btnText = document.getElementById('btn-text');

            html2canvas(target, { 
                scale: 3, 
                backgroundColor: '#fdfdfd',
                useCORS: true 
            }).then(canvas => {
                finalImg.src = canvas.toDataURL('image/png');
                finalImg.style.display = 'block';
                placeholder.style.display = 'none';
                btn.disabled = false;
                btnText.innerText = "下一张 NEXT";
            });
        }

        window.onload = fetchNewMovie;
    </script>
</body>
</html>
