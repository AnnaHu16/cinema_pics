<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CineMood AI - 电影台词拍立得</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=DM+Serif+Display&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream: #f8f4ee;
            --ink: #1a1a1a;
            --dim: #888;
            --accent: #c8a97e;
        }

        * { box-sizing: border-box; }

        body {
            background: #0c0b09;
            color: #fff;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-bottom: 120px;
        }

        /* ─── 隐藏渲染区域 ─── */
        #render-source {
            position: fixed;
            left: -9999px;
            top: 0;
            pointer-events: none;
        }

        /* ─── 拍立得本体（用于 html2canvas 捕获）─── */
        .polaroid {
            background: var(--cream);
            padding: 16px 16px 52px 16px;
            width: 640px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Noto Serif SC', serif;
        }

        .photo-frame {
            width: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .res-16-9  .photo-frame { aspect-ratio: 16 / 9; }
        .res-3-4   .photo-frame { aspect-ratio: 3 / 4; }
        .res-1-1   .photo-frame { aspect-ratio: 1 / 1; }

        /* 台词区 */
        .quote-area {
            margin-top: 28px;
            width: 100%;
            padding: 0 20px;
        }

        /* 左侧竖线装饰 */
        .quote-zh-wrap {
            border-left: 3px solid var(--accent);
            padding-left: 14px;
            margin-bottom: 14px;
        }

        .quote-zh {
            color: var(--ink);
            font-family: 'Noto Serif SC', serif;
            font-size: 26px;
            font-weight: 900;
            line-height: 1.6;
            word-break: break-all;
        }

        .quote-en {
            color: #999;
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: 12px;
            font-style: italic;
            letter-spacing: 0.04em;
            line-height: 1.5;
        }

        .movie-meta {
            margin-top: 20px;
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 6px;
            padding-right: 8px;
        }

        .meta-dot {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        .meta-text {
            color: var(--dim);
            font-size: 11px;
            font-style: italic;
            font-family: Georgia, serif;
        }

        /* ─── 展示区 ─── */
        #display-area {
            width: 92vw;
            max-width: 420px;
            margin-top: 70px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.85);
            border-radius: 2px;
            overflow: hidden;
            background: var(--cream);
            position: relative;
        }

        #final-img {
            width: 100%;
            height: auto;
            display: none;
        }

        #placeholder {
            width: 100%;
            aspect-ratio: 3/4;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .film-strip {
            display: flex;
            gap: 4px;
        }

        .film-hole {
            width: 8px; height: 8px;
            border-radius: 1px;
            background: #2a2a2a;
            animation: flicker 1.2s ease-in-out infinite;
        }
        .film-hole:nth-child(2) { animation-delay: 0.2s; }
        .film-hole:nth-child(3) { animation-delay: 0.4s; }
        .film-hole:nth-child(4) { animation-delay: 0.6s; }

        @keyframes flicker {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; background: var(--accent); }
        }

        .loading-text {
            color: #444;
            font-size: 10px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
        }

        /* ─── 顶部比例切换栏 ─── */
        .ratio-tabs {
            position: fixed;
            top: 0;
            left: 0; right: 0;
            display: flex;
            justify-content: center;
            gap: 0;
            background: rgba(12,11,9,0.92);
            backdrop-filter: blur(8px);
            padding: 14px 20px;
            border-bottom: 1px solid #1e1c18;
            z-index: 100;
        }

        .tab {
            font-size: 11px;
            font-weight: 600;
            color: #444;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            padding: 7px 18px;
            border-radius: 40px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .tab.active {
            color: #0c0b09;
            background: var(--accent);
        }

        /* ─── 底部按钮栏 ─── */
        .nav-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(12,11,9,0.95);
            backdrop-filter: blur(12px);
            padding: 16px 20px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
            border-top: 1px solid #1e1c18;
            z-index: 100;
        }

        .gen-btn {
            width: 85%;
            max-width: 320px;
            padding: 15px;
            background: #fff;
            color: #0c0b09;
            border-radius: 4px;
            font-weight: 900;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            font-size: 12px;
            transition: opacity 0.2s, transform 0.15s;
            border: none;
            cursor: pointer;
        }

        .gen-btn:active { transform: scale(0.97); }
        .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* 提示文字 */
        .hint-text {
            color: #333;
            font-size: 10px;
            letter-spacing: 0.38em;
            margin-top: 16px;
            text-align: center;
        }

        /* 错误提示 */
        .error-toast {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4444;
            color: #fff;
            font-size: 12px;
            padding: 8px 20px;
            border-radius: 40px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .error-toast.show { opacity: 1; }
    </style>
</head>
<body>

    <!-- 比例切换 -->
    <div class="ratio-tabs">
        <button onclick="setRatio('res-16-9', this)" class="tab active">16:9</button>
        <button onclick="setRatio('res-3-4', this)"  class="tab">小红书</button>
        <button onclick="setRatio('res-1-1', this)"  class="tab">朋友圈</button>
    </div>

    <!-- 展示区 -->
    <div id="display-area">
        <div id="placeholder">
            <div class="film-strip">
                <div class="film-hole"></div>
                <div class="film-hole"></div>
                <div class="film-hole"></div>
                <div class="film-hole"></div>
            </div>
            <p class="loading-text">Developing</p>
        </div>
        <img id="final-img" src="" alt="电影拍立得">
    </div>

    <p class="hint-text">↑ 长按图片保存 ↑</p>

    <!-- 隐藏渲染源 -->
    <div id="render-source">
        <div id="capture-target" class="polaroid res-16-9">
            <div class="photo-frame">
                <img id="source-img" src="" alt="">
            </div>
            <div class="quote-area">
                <div class="quote-zh-wrap">
                    <p id="target-zh" class="quote-zh"></p>
                </div>
                <p id="target-en" class="quote-en"></p>
                <div class="movie-meta">
                    <div class="meta-dot"></div>
                    <p id="target-meta" class="meta-text"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- 错误提示 -->
    <div id="error-toast" class="error-toast">网络错误，请重试</div>

    <!-- 底部按钮 -->
    <div class="nav-bar">
        <button id="gen-btn" onclick="generate()" class="gen-btn">下一张 NEXT</button>
    </div>

    <script>
        let currentRatio = 'res-16-9';

        function setRatio(r, btn) {
            currentRatio = r;
            document.getElementById('capture-target').className = `polaroid ${r}`;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            generate();
        }

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function generate() {
            const btn = document.getElementById('gen-btn');
            const finalImg = document.getElementById('final-img');
            const placeholder = document.getElementById('placeholder');

            btn.disabled = true;
            btn.innerText = 'DEVELOPING...';
            placeholder.style.display = 'flex';
            finalImg.style.display = 'none';

            try {
                const res = await fetch('/api/generate');
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                if (!data.image) throw new Error('No image returned');

                document.getElementById('target-zh').innerText   = data.quote.zh;
                document.getElementById('target-en').innerText   = data.quote.en;
                document.getElementById('target-meta').innerText = `${data.title}${data.year ? '  ' + data.year : ''}`;

                const sourceImg = document.getElementById('source-img');
                sourceImg.onload = function () {
                    html2canvas(document.getElementById('capture-target'), {
                        scale: 3,
                        backgroundColor: '#f8f4ee',
                        useCORS: true,
                        allowTaint: false,
                        logging: false,
                    }).then(canvas => {
                        finalImg.src = canvas.toDataURL('image/jpeg', 0.95);
                        finalImg.style.display = 'block';
                        placeholder.style.display = 'none';
                        btn.disabled = false;
                        btn.innerText = '下一张 NEXT';
                    }).catch(() => {
                        showError('渲染失败，请重试');
                        btn.disabled = false;
                        btn.innerText = '下一张 NEXT';
                        placeholder.style.display = 'none';
                    });
                };
                sourceImg.onerror = function () {
                    showError('图片加载失败');
                    btn.disabled = false;
                    btn.innerText = '下一张 NEXT';
                };
                sourceImg.src = data.image;

            } catch (err) {
                console.error(err);
                showError('获取失败，请重试');
                btn.disabled = false;
                btn.innerText = '重试 RETRY';
                placeholder.style.display = 'none';
            }
        }

        window.onload = generate;
    </script>
</body>
</html>
